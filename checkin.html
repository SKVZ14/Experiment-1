<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Check In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D;
    --ink-soft:#1c2a4d;
    --paper:#FAF7F0;
    --success:#2BAF66;
    --error:#E4572E;
    --gold:#D4A94C;
    --muted:rgba(250,247,240,0.6);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; min-height:100%;
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:440px;
    margin:0 auto;
    min-height:100dvh;
    padding:calc(28px + env(safe-area-inset-top)) 20px calc(28px + env(safe-area-inset-bottom));
  }
  header{ text-align:center; margin-bottom:24px; }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:6px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.5rem;
    margin:0;
  }
  #configWarning{
    margin-bottom:20px;
    padding:12px 14px;
    background:rgba(228,87,46,0.16);
    border:1px solid var(--error);
    border-radius:12px;
    font-size:0.78rem;
    font-family:'IBM Plex Mono',monospace;
    display:none;
  }

  .group{ margin-bottom:22px; }
  .group h2{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 10px 4px;
    font-weight:500;
  }
  .row{ display:flex; gap:10px; }
  .row.single{ display:block; }

  .event-btn{
    flex:1;
    background:var(--ink-soft);
    border:1px solid rgba(250,247,240,0.14);
    color:var(--paper);
    border-radius:14px;
    padding:16px 14px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:0.95rem;
    text-align:left;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    gap:6px;
    transition:background .15s ease, border-color .15s ease;
    position:relative;
    overflow:hidden;
    width:100%;
  }
  .event-btn .status{
    font-family:'IBM Plex Mono',monospace;
    font-weight:400;
    font-size:0.76rem;
    color:var(--muted);
  }
  .event-btn:active{ background:#243458; }
  .event-btn.state-success{ border-color:var(--success); background:rgba(43,175,102,0.14); }
  .event-btn.state-duplicate{ border-color:var(--gold); background:rgba(212,169,76,0.14); }
  .event-btn.state-error{ border-color:var(--error); background:rgba(228,87,46,0.14); }
  .event-btn.state-loading{ opacity:0.7; }
  .event-btn.state-success .status{ color:var(--success); }
  .event-btn.state-duplicate .status{ color:var(--gold); }
  .event-btn.state-error .status{ color:var(--error); }

  #whoami{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.82rem;
    color:var(--muted);
    text-align:center;
    margin-bottom:26px;
  }
  #whoami b{ color:var(--paper); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="eyebrow">Attendance</div>
    <h1>Tap what you're here for</h1>
  </header>

  <div id="configWarning">⚠ CONFIG.SCRIPT_URL isn't set. Open this file, find CONFIG near the top of the &lt;script&gt;, and paste your Apps Script Web App URL in.</div>

  <div id="whoami"></div>

  <div class="group">
    <h2>Morning</h2>
    <div class="row single">
      <button class="event-btn" data-event="morning_deposit" data-label="Morning Deposit">
        Morning Deposit
        <span class="status">Tap to record</span>
      </button>
    </div>
  </div>

  <div class="group">
    <h2>Snack</h2>
    <div class="row">
      <button class="event-btn" data-event="snack_claim" data-label="Snack Claim">
        Claim
        <span class="status">Tap to record</span>
      </button>
      <button class="event-btn" data-event="snack_deposit" data-label="Snack Deposit">
        Deposit
        <span class="status">Tap to record</span>
      </button>
    </div>
  </div>

  <div class="group">
    <h2>Lunch</h2>
    <div class="row">
      <button class="event-btn" data-event="lunch_claim" data-label="Lunch Claim">
        Claim
        <span class="status">Tap to record</span>
      </button>
      <button class="event-btn" data-event="lunch_deposit" data-label="Lunch Deposit">
        Deposit
        <span class="status">Tap to record</span>
      </button>
    </div>
  </div>

  <div class="group">
    <h2>Afternoon</h2>
    <div class="row single">
      <button class="event-btn" data-event="afternoon_claim" data-label="Afternoon Claim">
        Afternoon Claim
        <span class="status">Tap to record</span>
      </button>
    </div>
  </div>
</div>

<script>
  // ────────────────────────────────────────────────────────────
  // CONFIG — paste your Apps Script Web App URL below
  // ────────────────────────────────────────────────────────────
  const CONFIG = {
    SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxhcd50uguaohXPH2bFTNK4L5zTaUZp3DKgyyJ2RXqEpk2VdBjmZxDRhuw_Y_bBxqPFAg/exec"
  };

  function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      id: (params.get('id') || '').trim(),
      name: (params.get('name') || '').trim()
    };
  }

  const { id, name } = getParams();
  const whoamiEl = document.getElementById('whoami');
  const warnEl = document.getElementById('configWarning');

  if (!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL.indexOf('PASTE_YOUR') === 0) {
    warnEl.style.display = 'block';
  }

  if (!id) {
    whoamiEl.innerHTML = '<span style="color:#E4572E">No ID found in this link — scan a valid badge.</span>';
  } else {
    whoamiEl.innerHTML = name
      ? `Checking in as <b>${name}</b> <span style="opacity:0.6">(${id})</span>`
      : `Checking in as <b>${id}</b>`;
  }

  document.querySelectorAll('.event-btn').forEach(btn => {
    btn.addEventListener('click', () => handleTap(btn));
  });

  async function handleTap(btn) {
    if (!id || btn.classList.contains('state-loading')) return;

    const eventKey = btn.dataset.event;
    const statusEl = btn.querySelector('.status');

    btn.className = 'event-btn state-loading';
    statusEl.textContent = 'Recording…';

    try {
      const res = await fetch(CONFIG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight against Apps Script
        body: JSON.stringify({ id, name, event: eventKey })
      });
      const data = await res.json();

      if (data.status === 'success') {
        btn.className = 'event-btn state-success';
        statusEl.textContent = `Recorded at ${data.time}`;
      } else if (data.status === 'duplicate') {
        btn.className = 'event-btn state-duplicate';
        statusEl.textContent = `Already recorded at ${data.time}`;
      } else {
        btn.className = 'event-btn state-error';
        statusEl.textContent = data.message || 'Something went wrong';
      }
    } catch (err) {
      btn.className = 'event-btn state-error';
      statusEl.textContent = 'Network error — try again';
    }
  }
</script>
</body>
</html>
